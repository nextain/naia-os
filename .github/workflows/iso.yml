name: Generate ISO

on:
  workflow_run:
    workflows: ["Build Naia"]
    types: [completed]
  workflow_dispatch:

env:
  IMAGE_NAME: naia-os
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-iso:
    name: Generate ISO
    runs-on: ubuntu-24.04
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: write
      packages: read

    steps:
      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@v9

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ISO
        id: build
        uses: nextain/titanoboa@main
        with:
          image-ref: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          hook-post-rootfs: ${{ github.workspace }}/installer/hook-post-rootfs.sh
          flatpaks-list: ${{ github.workspace }}/installer/flatpaks
          iso-dest: ${{ github.workspace }}/naia-os-live-amd64.iso
          compression: squashfs

      - name: Get build date
        id: date
        run: echo "date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Generate Checksum
        run: |
          ISO_PATH="${{ steps.build.outputs.iso-dest }}"
          echo "ISO path: $ISO_PATH"
          ls -lh "$ISO_PATH"
          sha256sum "$ISO_PATH" > "${ISO_PATH}-CHECKSUM"

      - name: Upload ISO as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: naia-os-live
          path: |
            ${{ steps.build.outputs.iso-dest }}
            ${{ steps.build.outputs.iso-dest }}-CHECKSUM
          retention-days: 30
          if-no-files-found: error

      - name: Upload ISO to Cloudflare R2
        if: github.ref == 'refs/heads/main'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
          AWS_REGION: auto
        run: |
          ISO_PATH="${{ steps.build.outputs.iso-dest }}"
          # Backup previous ISO before overwriting
          aws s3 cp s3://naia-releases/naia-os-live-amd64.iso \
                    s3://naia-releases/previous/naia-os-live-amd64.iso --no-progress || true
          aws s3 cp s3://naia-releases/naia-os-live-amd64.iso-CHECKSUM \
                    s3://naia-releases/previous/naia-os-live-amd64.iso-CHECKSUM --no-progress || true
          # Upload new ISO
          aws s3 cp "$ISO_PATH" s3://naia-releases/naia-os-live-amd64.iso --no-progress
          aws s3 cp "${ISO_PATH}-CHECKSUM" s3://naia-releases/naia-os-live-amd64.iso-CHECKSUM --no-progress
          echo "Uploaded to R2: naia-os-live-amd64.iso (previous backed up)"

      - name: Upload CHECKSUM to Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: iso-0.1.3.${{ steps.date.outputs.date }}.${{ github.run_number }}
          name: "Naia OS 0.1.3 (Build #${{ github.run_number }}, ${{ steps.date.outputs.date }})"
          body: |
            ISO download: https://pub-affd0538517845d98ce44a5aec11dd98.r2.dev/naia-os-live-amd64.iso
            Checksum: https://pub-affd0538517845d98ce44a5aec11dd98.r2.dev/naia-os-live-amd64.iso-CHECKSUM
          files: ${{ steps.build.outputs.iso-dest }}-CHECKSUM
          draft: true
