name: Build Naia

on:
  schedule:
    - cron: "0 6 * * 3" # every Wednesday 6:00 UTC — pick up Bazzite base updates
  push:
    branches: [main]
    paths:
      - "recipes/**"
      - "config/**"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
    paths:
      - "recipes/**"
      - "config/**"
  workflow_run:
    workflows: ["Release Naia Shell"]
    types: [completed]
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build Image
        uses: blue-build/github-action@v1
        with:
          recipe: recipe.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}

      - name: Smoke Test
        run: |
          podman run --rm ${{ env.IMAGE_REGISTRY }}/naia-os:latest bash -c '
            set -e
            rpm -q fcitx5 fcitx5-hangul google-noto-sans-cjk-vf-fonts
            grep -q "Naia" /usr/lib/os-release
            test -f /usr/share/naia/Naia-Shell-x86_64.flatpak
            ls /usr/share/plasma/shells/org.kde.plasma.desktop/contents/updates/naia-*.js
            test -f /usr/etc/xdg/autostart/naia-shell.desktop
            echo "ALL SMOKE TESTS PASSED"
          '
