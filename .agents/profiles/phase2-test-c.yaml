apiVersion: cross-review/v1
kind: ReviewProfile
metadata:
  name: phase2-test-c
  description: "Phase 2 test — Persona C (overcautious reviewer)"
  extends: _base

spec:
  reviewers:
    count: 3
    specs:
      - id: correctness
        expertise: "Logic and correctness"
        prompt_ref: correctness.md
        strategy: "Line-by-line logic analysis"
      - id: security
        expertise: "Security and safety"
        prompt_ref: security-expert.md
        strategy: "Pattern-based security scan"
      - id: bad-reviewer
        expertise: "Nation-State Threat Assessment (OVERCAUTIOUS)"
        prompt_ref: bad-reviewer-c-overcautious.md
        strategy: "Maximum threat model — all findings CRITICAL/HIGH"

  consensus:
    strategy: "unanimous"
    clean_rounds: 2
    max_debate_rounds: 2

  limits:
    max_rounds: 5

  dismissal:
    strikes_before_dismissal: 2
