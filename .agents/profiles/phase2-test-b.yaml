apiVersion: cross-review/v1
kind: ReviewProfile
metadata:
  name: phase2-test-b
  description: "Phase 2 test — Persona B (scope-constrained reviewer)"
  extends: _base

spec:
  reviewers:
    count: 3
    specs:
      - id: correctness
        expertise: "Logic and correctness"
        prompt_ref: correctness.md
        strategy: "Line-by-line logic analysis"
      - id: security
        expertise: "Security and safety"
        prompt_ref: security-expert.md
        strategy: "Pattern-based security scan"
      - id: bad-reviewer
        expertise: "General Code Quality (SCOPE-CONSTRAINED)"  # NOTE: expertise deliberately mismatches prompt's header-only focus, so 8A domain check classifies header-doc findings as domain-inconsistent → strikes accumulate
        prompt_ref: bad-reviewer-b-scope-constrained.md
        strategy: "Header section audit — lines 1-20 only"

  consensus:
    strategy: "unanimous"
    clean_rounds: 2
    max_debate_rounds: 2

  limits:
    max_rounds: 5

  evidence_requirements:
    min_files_read: 1  # Reduced: bad-reviewer-b is scope-constrained to lines 1-20 of one file
    must_read_source: true

  dismissal:
    strikes_before_dismissal: 2
