# SPDX-License-Identifier: CC-BY-SA-4.0
#
# Harness Engineering Context
#
# Mechanical enforcement of project rules via Claude Code hooks,
# progress files for session handoff, and automated tests.
#
# Concept: "Engineer the environment so the AI never repeats a mistake."
# (Mitchell Hashimoto, Feb 2026)

version: 1
name: harness-engineering
mirror:
  users: .users/context/harness.md
  users_ko: .users/context/ko/harness.md

overview:
  principle: "Text rules get forgotten; mechanical enforcement doesn't."
  pillars:
    - name: hooks
      description: "Claude Code PostToolUse hooks that intercept edits and commands in real-time"
    - name: progress_files
      description: "JSON session handoff files that survive context compaction and session boundaries"
    - name: tests
      description: "Bash test suite verifying all hooks behave correctly"

hooks:
  location: .claude/hooks/
  registration: .claude/settings.json
  protocol:
    input: "stdin JSON — { tool_name, tool_input, cwd, session_id }"
    output: "stdout JSON — { reason, hookSpecificOutput: { hookEventName, additionalContext } }"
    blocking: "Set decision: 'block' in output to prevent tool execution (PreToolUse only)"

  sync_entry_points:
    file: sync-entry-points.js
    trigger: "PostToolUse on Edit|Write"
    purpose: "Auto-sync CLAUDE.md ↔ AGENTS.md ↔ GEMINI.md"
    behavior:
      - "Detects when any entry point file is edited"
      - "Copies content to the other two (if they exist)"
      - "Uses temp lockfile to prevent recursive sync"
      - "Only syncs to files that already exist (won't create GEMINI.md if absent)"
    enforces: "Cascade rule — entry point files must always be identical"

  cascade_check:
    file: cascade-check.js
    trigger: "PostToolUse on Edit|Write"
    purpose: "Remind agent about triple-mirror updates"
    patterns:
      - ".agents/context/*.yaml|json → remind .users/context/ + .users/context/ko/"
      - ".users/context/*.md (not ko/) → remind .agents/ + .users/context/ko/"
      - ".users/context/ko/*.md → remind .agents/ + .users/context/"
      - "agents-rules.json → extra SoT warning"
    behavior: "Advisory (additionalContext), not blocking"

  process_guard:
    file: process-guard.js
    trigger: "Stop (AI response end)"
    purpose: "Detect 'declaration without action' — review-completion claims without actual file reads"
    behavior:
      - "Reads last 128KB of transcript_path JSONL"
      - "Finds last assistant message text + tool calls"
      - "If text matches review-pass patterns AND no Read/Grep/Glob was called → decision: block"
      - "stop_hook_active check prevents infinite loop"
      - "Advisory patterns: 수정 없음, 변경 없음, 클린 패스, clean pass, no changes found, etc."
    enforces: "Iterative review rule — two consecutive clean passes required, each pass must read files"
    inspiration: "open-swe ensure_no_empty_msg pattern (langchain-ai/open-swe)"

  commit_guard:
    file: commit-guard.js
    trigger: "PostToolUse on Bash (git commit commands)"
    purpose: "Warn when committing before E2E test and context sync; remind about Lore trailers"
    behavior:
      - "Reads most recent .agents/progress/*.json"
      - "Checks current_phase against PHASE_ORDER"
      - "Warns if phase is before sync_verify"
      - "If rejected_alternatives[] non-empty → advisory to add Rejected: trailers"
      - "If constraints_discovered[] non-empty → advisory to add Constraint: trailers"
      - "Gracefully passes if no progress file exists"
    phase_order:
      - issue
      - understand
      - scope
      - investigate
      - plan
      - build
      - review
      - e2e_test
      - post_test_review
      - sync
      - sync_verify
      - report
      - commit
    min_phase_for_commit: sync_verify

progress_files:
  location: .agents/progress/
  format: JSON
  gitignored: true
  purpose: "Session handoff — survives context compaction and session boundaries"

  schema:
    issue: "GitHub Issue reference (e.g., '#42')"
    title: "Short description of the work"
    project: "Project name (e.g., 'naia-os')"
    current_phase: "Current phase from PHASE_ORDER"
    gate_approvals:
      description: "Map of gate → ISO timestamp when user approved"
      keys: [understand, scope, plan, sync]
    decisions:
      description: "Array of key decisions made during this work"
      fields: [decision, rationale, date]
    surprises:
      description: "Unexpected findings during investigation/build"
    blockers:
      description: "Current blockers preventing progress"
    rejected_alternatives:
      description: "Approaches considered but rejected during investigation or planning (T2: decision shadow)"
      fields: [approach, reason, date]
      record_when:
        - "investigate: when an approach is tried and fails or discarded"
        - "plan: when comparing alternatives and choosing one over others"
    constraints_discovered:
      description: "Technical or architectural constraints discovered that shaped the decision (T2: decision context)"
      fields: [constraint, scope, date]
      record_when:
        - "investigate: when a platform/library constraint is found"
        - "build: when a constraint is encountered during implementation"
    test_findings:
      description: "Diagnostic results from test failures — mandatory before returning from e2e_test to build/plan"
      fields: [test_name, error_summary, root_cause, routing]
    review_evidence:
      description: "Proof that iterative review actually happened — files read per pass, issues found (T3: anti-cheat)"
      fields: [pass, files_read, issues_found, date]
      record_when:
        - "review: after each iterative review pass (use /review skill)"
        - "post_test_review: after each post-test review pass"
      constraint: "Two passes with empty issues_found[] = review complete. Do NOT declare complete without evidence."
    updated_at: "ISO timestamp of last update"

  update_points:
    - "Gate approval (understand, scope, plan, sync)"
    - "Build phase start"
    - "Build sub-phase completion"
    - "Session end (mandatory)"
    - "On surprise or blocker discovery"
    - "Phase transition"
    - "Approach rejected during investigate/plan → append to rejected_alternatives[]"
    - "Constraint discovered during investigate/build → append to constraints_discovered[]"
    - "Review pass completed → append to review_evidence[]"

  example:
    issue: "#42"
    title: "Add avatar idle animation"
    project: "naia-os"
    current_phase: "build"
    gate_approvals:
      understand: "2026-03-14T10:00Z"
      scope: "2026-03-14T10:15Z"
      plan: "2026-03-14T11:00Z"
    decisions:
      - decision: "Use Three.js AnimationMixer for idle"
        rationale: "Upstream VRM uses it, minimal custom code"
        date: "2026-03-14"
    rejected_alternatives:
      - approach: "AudioContext({sampleRate:16000})"
        reason: "WebKitGTK freezes audio to zeros"
        date: "2026-03-17"
    constraints_discovered:
      - constraint: "WebKitGTK AudioContext — default sampleRate only"
        scope: "shell/src/audio/*"
        date: "2026-03-17"
    surprises: []
    blockers: []
    test_findings:
      - test_name: "03-basic-chat.spec.ts"
        error_summary: "Expected non-empty response, got empty string"
        root_cause: "Gateway connection timeout — agent not spawned"
        routing: "implementation_issue → BUILD"
    updated_at: "2026-03-14T14:30Z"

# T4: Context Governance — WHERE each type of knowledge belongs
# Extends artifact_storage in issue-driven-development.yaml
# (artifact_storage: intermediate → GitHub Issues, final → .agents/ context files)
# This matrix clarifies the finer distinctions WITHIN those categories.
context_update_matrix:
  session_local:
    target: ".agents/progress/*.json"
    gitignored: true
    when: "Ephemeral session state — current phase, in-progress decisions, rejected_alternatives, constraints_discovered, surprises, blockers, test_findings"
    note: "These are NOT committed. They survive context compaction but not machine changes."

  accumulated_lessons:
    target: ".agents/context/lessons-learned.yaml"
    when: "A mistake was corrected during this session, OR a recurring pattern is identified"
    required_fields: [id, date, issue, category, title, problem, root_cause, fix]
    optional_fields: [scope, reference]
    upgrade_rule: "If a new lesson is similar to an existing entry → do NOT add a duplicate. Instead, strengthen a hook to prevent the pattern mechanically."

  domain_context:
    target: ".agents/context/{domain}.yaml"
    when: "A permanent technical constraint is confirmed, architecture decision is finalized, or a stable process is established"
    note: "This is for knowledge that future sessions need on every load — not temporary investigation findings."

  harness_update:
    target: ".claude/hooks/*.js"
    when: "The same mistake appears in lessons-learned.yaml TWICE or more — mechanical enforcement is now warranted"
    required: "Add a test BEFORE adding or modifying a hook (TDD for harness)"
    process:
      - "Identify the repeated pattern in lessons-learned"
      - "Write a failing test that reproduces the undesired AI behavior"
      - "Implement the hook that makes the test pass"
      - "Update harness.yaml coverage count"

tests:
  location: .agents/tests/harness/
  runner: run-all.sh
  command: "bash .agents/tests/harness/run-all.sh"
  coverage:
    sync_entry_points: 11
    commit_guard: 26
    cascade_check: 12
    progress_schema: 7
    integration_lifecycle: 2
    process_guard: 14
    total: 72

directory_structure:
  committed:
    - .claude/settings.json
    - .claude/hooks/sync-entry-points.js
    - .claude/hooks/cascade-check.js
    - .claude/hooks/commit-guard.js
    - .claude/hooks/process-guard.js
    - .agents/context/harness.yaml
    - .agents/tests/harness/run-all.sh
    - .agents/progress/.gitkeep
  gitignored:
    - ".claude/* (except settings.json and hooks/)"
    - ".agents/progress/*.json"
