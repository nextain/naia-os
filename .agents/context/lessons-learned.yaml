#
# Lessons Learned
#
# Accumulated lessons from development cycles.
# Read during INVESTIGATE phase. Written during SYNC phase.
#
# T6: Knowledge Continuity — scope field identifies WHERE a lesson applies.
# This enables future AI sessions to find relevant lessons by the files they are about to touch.
#
# Schema:
#   id:         L{NNN} — sequential
#   date:       YYYY-MM-DD
#   issue:      "#N" (optional for workflow-level lessons)
#   category:   keyword (testing, observability, upstream-integration, workflow, audio, ...)
#   scope:      file glob or module name — OMIT for global/workflow-level lessons
#               Examples: "shell/src/audio/*", "agent/llm-registry", ".claude/hooks/*"
#   title:      one-line summary
#   problem:    what went wrong
#   root_cause: why it went wrong
#   fix:        what was changed
#   reference:  link to doc (optional)

version: 1
name: lessons-learned
mirror:
  users: .users/context/lessons-learned.md
  users_ko: .users/context/ko/lessons-learned.md

lessons:

  - id: L001
    date: "2026-03-15"
    issue: "#60"
    category: testing
    title: "E2E incomplete but marked as complete"
    problem: "LLM Provider Registry (#60) was marked as 5-phase complete, but E2E provider switching tests were blocked by infrastructure issues (tauri-driver SIGINT). Work was reported as 'done' without actual E2E verification."
    root_cause: "No rule requiring E2E completion before marking work done. AI success bias — uncertain state reported as complete."
    fix: "Added test_attitude rules, diagnose step in on_failure, success_bias_reporting in AI behavioral traps."
    reference: "docs-work-logs/luke/report/20260315-harness-context-quality-audit.md"

  - id: L002
    date: "2026-03-15"
    category: testing
    title: "Test pass ≠ correct behavior"
    problem: "AI loosened test assertions to make failing tests pass instead of investigating app code bugs."
    root_cause: "e2e_test phase output was defined as 'Passing E2E test', making 'pass' the explicit goal. No anti-patterns for test gaming."
    fix: "Output redefined to 'E2E diagnostic complete'. Added test_attitude anti-patterns (assertion loosening, expected value gaming, test deletion)."

  - id: L003
    date: "2026-03-15"
    category: observability
    title: "Debug logging added only after bugs discovered"
    problem: "When a bug occurred, first step was always adding Logger.debug() — meaning the first occurrence was always undiagnosed."
    root_cause: "debug_logging rules specified what and how to log, but not WHEN (build-time vs debug-time)."
    fix: "Added debug_logging.when rule: 'Debug logging is a BUILD-TIME activity'. Added to review checklists."

  - id: L004
    date: "2026-03-18"
    issue: "#73"
    category: upstream-integration
    title: "Landscape research skipped — wrong upstream target discovered after full implementation"
    problem: "Implemented SupportsAudioOutput in a vllm fork only to discover vllm-omni is the correct upstream target. Audio output was explicitly scoped out of vllm main (RFC #16052). Full implementation wasted."
    root_cause: "No pre-work research step before forking. RFC history not checked. Sub-project existence (vllm-omni) not discovered. No upstream issue opened before coding."
    fix: "Added upstream-contribution.yaml workflow: landscape research required before any implementation (scope check, AI policy, RFC history, sub-project discovery, maintainer stance). Progress file upstream_issue_ref field added. commit-guard advisory for upstream contributions."
    reference: ".agents/context/upstream-contribution.yaml"

  - id: L005
    date: "2026-03-19"
    issue: "#89"
    category: workflow
    title: "Context compaction skips mandatory reads — rules not followed in resumed session"
    problem: "When context was compacted and session resumed from summary, AI jumped directly into implementation without performing mandatory reads (agents-rules.json, ai-work-index.yaml, project-index.yaml). Result: build-time logging skipped, iterative review not done, success_bias_reporting triggered, user felt AI was developing autonomously without oversight."
    root_cause: "CLAUDE.md mandatory reads require 'every session start'. But compacted resumption is treated as a continuation, not a new session — the mandate was never triggered. Summary did not contain a reminder to re-read rules."
    fix: "After context compaction, the resumed session MUST treat itself as a new session start: read agents-rules.json before proceeding with any implementation. Progress file (.agents/progress/*.json) must be maintained so resumed sessions know which phase/gate they are in."

  - id: L006
    date: "2026-03-20"
    issue: "#89"
    category: ipc
    scope: "shell/src/components/PanelInstallDialog.tsx, agent/src/index.ts"
    title: "panel_install_result must arrive before panel_control reload — timing is critical"
    problem: "PanelInstallDialog auto-close logic depends on successRef being set by panel_install_result. If panel_control reload arrives first, successRef is still false → dialog never closes even on success."
    root_cause: "actionInstall internally emits panel_control reload at the end. The agent wrapper did not suppress this and emitted its own reload after the result — but order was not guaranteed."
    fix: "Agent panel_install handler passes writeLine: () => undefined to actionInstall (suppresses inner panel_control). After awaiting result, it explicitly emits panel_install_result FIRST, then panel_control reload (only if success). Order is now deterministic."

  - id: L007
    date: "2026-03-20"
    issue: "#89"
    category: ipc
    scope: "shell/src/components/PanelInstallDialog.tsx, shell/src/lib/chat-service.ts"
    title: "Events without requestId cannot use chat-service requestId filter — must use direct listen()"
    problem: "panel_install_result has no requestId field. chat-service.ts filter drops any chunk where chunk.requestId !== requestId, so panel_install_result was silently discarded."
    root_cause: "requestId filter was written for chat responses (all of which carry requestId). New event types that originate outside the normal chat flow do not carry requestId."
    fix: "PanelInstallDialog uses Tauri listen('agent-response-chunk') directly, bypassing chat-service. TypeScript type check also required guard: !('requestId' in chunk) || chunk.requestId !== requestId."

  - id: L008
    date: "2026-03-20"
    issue: "#89"
    category: naming
    scope: "agent/src/skills/built-in/panel.ts, shell/src-tauri/src/panel.rs, docs/"
    title: "Terminology drift (app vs panel) causes widespread confusion — pick one and enforce"
    problem: "Mid-implementation, 'app' terminology was partially adopted (app.json, ~/.naia/apps/, 'app_list_installed'). Mixed with existing 'panel' terms, creating broken file references and confusing documentation."
    root_cause: "Naming decision was made informally and not propagated atomically across all files. Each file was updated independently without a checklist."
    fix: "Reverted all 'app' terms back to 'panel'. Enforced: panel.json, ~/.naia/panels/, panel_list_installed, panel_remove_installed, PanelDescriptor. Added critical_gotchas.terminology note in architecture.yaml."
