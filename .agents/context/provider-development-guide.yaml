# Provider Development Guide — AI SoT
# Human-readable mirrors:
#   .users/context/provider-development-guide.md (English)
#   .users/context/ko/provider-development-guide.md (Korean)

architecture:
  pattern: dual-registry
  shell_registry:
    path: shell/src/lib/providers/
    purpose: UI metadata (name, configFields, capabilities, models, voices)
    functions: [defineProvider, listProviders, getProvider, getProviderIds, hasProvider, clearRegistry]
    key_scheme: "composite key ${type}:${id} — prevents ID collisions (e.g., 'nextain' exists as both LLM and TTS)"
    provider_count: "8 LLM, 5 TTS, 3 STT (as of Issue #51)"
  agent_registry:
    path: agent/src/providers/registry.ts
    purpose: runtime implementations (LLM factories)
    functions: [registerLlm, getLlm]
    note: "TTS registry (registerTts/getTts) defined but integration deferred to STT/TTS abstraction phase"
  openai_compat_factory:
    path: agent/src/providers/openai-compat.ts
    purpose: shared factory for OpenAI-compatible LLM providers
    function: createOpenAICompatProvider(options)
    note: "Contributors can use this factory for new OpenAI-compatible providers"

registered_providers:
  llm:
    verified:
      - nextain       # Naia Lab cloud (no API key, uses naiaKey)
      - claude-code-cli # Local CLI
      - gemini        # GEMINI_API_KEY
      - openai        # OPENAI_API_KEY
      - anthropic     # ANTHROPIC_API_KEY
      - xai           # XAI_API_KEY
      - zai           # ZHIPU_API_KEY
      - ollama        # Local, no key
    note: "Only providers with verified API keys in .env are registered. Contributors may add more."
  tts:
    - edge            # Free, msedge-tts (no API key)
    - nextain         # Naia Lab TTS (uses naiaKey)
    - google          # Google Cloud TTS (Gemini API key works)
    - openai          # OpenAI TTS API
    - elevenlabs      # ElevenLabs API
    note: "Metadata defined in shell registry. Runtime integration planned."
  stt:
    - vosk            # Local, Rust (CPU-friendly)
    - whisper         # Local, Rust (GPU recommended)
    - web-speech-api  # Browser built-in (Chrome/Edge)
    note: "Metadata defined in shell registry. Runtime integration planned."

adding_provider:
  llm:
    steps:
      - create: shell/src/lib/providers/llm/{name}.ts  # defineProvider() metadata + listModels()
      - register: shell/src/lib/providers/llm/index.ts  # add import
      - implement: agent/src/providers/{name}.ts  # LLMProvider interface (or use createOpenAICompatProvider)
      - register_agent: agent/src/providers/register.ts  # registerLlm() wrapper
      - verify: "Add API key to .env, run unit tests + E2E spec 80"
    result: Settings UI auto-discovers provider and models
    tip: "For OpenAI-compatible APIs, use createOpenAICompatProvider() from agent/src/providers/openai-compat.ts — handles streaming, tool calls, usage tracking automatically."

  tts:
    steps:
      - create: shell/src/lib/providers/tts/{name}.ts  # defineProvider() metadata + listVoices()
      - register: shell/src/lib/providers/tts/index.ts  # add import
      - implement: agent/src/tts/{name}.ts  # synthesize function → base64 MP3
      - register_agent: agent/src/tts/register.ts  # registerTts() wrapper
    result: Settings UI auto-discovers, no manual UI changes
    status: "Shell metadata ready. Agent-side runtime integration in progress."

  stt:
    browser:
      steps:
        - create: shell/src/lib/providers/stt/{name}.ts  # metadata only
        - register: shell/src/lib/providers/stt/index.ts  # add import
      note: browser STT runtime in ChatPanel voice pipeline
    rust:
      steps:
        - create: shell/src/lib/providers/stt/{name}.ts  # metadata
        - extend: shell/src-tauri/plugins/tauri-plugin-stt/  # Rust implementation
      note: requires Rust knowledge + Tauri plugin experience
    status: "Shell metadata ready. Runtime integration planned."

provider_knowhow:
  edge_tts:
    cost: free
    package: msedge-tts
    voice_count: 80+
    voice_format: "{locale}-{Name}Neural"
  google_cloud_tts:
    auth: Gemini API key works
    voice_format: "{locale}-Neural2-{letter}"
  openai_tts:
    models: [tts-1, tts-1-hd, gpt-4o-mini-tts]
    mini_only_voices: [ballad, cedar, juniper, marin, verse]
    voices: [alloy, echo, fable, onyx, nova, shimmer]
  elevenlabs:
    voice_resolution: name→ID via API
    models: [eleven_multilingual_v2, eleven_flash_v2_5]
    flash_cost: 0.5x
  vosk:
    runtime: rust
    model_size: ~50MB/language
    storage: ~/.naia/stt-models/
  whisper:
    runtime: rust
    gpu: recommended
    models: [tiny, base, small, medium, large]
    cuda: optional (issue #50)
