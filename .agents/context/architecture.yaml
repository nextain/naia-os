description: Naia hybrid architecture (mirror of .users/context/ko/architecture.md)

design_philosophy: |
  Naia is NOT built from scratch. It's a hybrid assembly of 3 proven ecosystems:
  OpenClaw (Gateway/exec), project-careti (LLM/tools), OpenCode (architecture pattern).
  Each contributes its strongest capability. The result is greater than any single source.

why_hybrid:
  pure_openclaw_problems:
    - "CLI-only UX — no avatar, no visual feedback, no emotion"
    - "No Tauri/desktop-native shell — terminal-first design"
    - "Tight coupling to Claude Code as the only agent model"
    - "No multi-provider LLM support (Gemini, xAI, etc.)"
  pure_careti_problems:
    - "VS Code extension — not an OS, not always-on"
    - "No daemon architecture — dies when IDE closes"
    - "No external channels (Discord, Telegram, etc.)"
    - "No skills system, no memory persistence"
  pure_opencode_problems:
    - "TUI-only — no VRM avatar, no desktop app"
    - "No Gateway/daemon concept"
    - "No channel integration"
  hybrid_solution: |
    Take OpenClaw's daemon+exec+channels+skills ecosystem as the runtime backend.
    Take Careti's multi-provider LLM+tool definitions+stdio protocol as the agent core.
    Take OpenCode's client/server architecture pattern for clean separation.
    Wrap it in a Tauri desktop shell with VRM avatar for accessible UX.

three_pillars:
  pillar_1_openclaw:
    role: "Runtime backend (daemon + execution environment)"
    provides:
      - "Gateway WebSocket server (systemd, always-on)"
      - "Command/file RPCs (exec.bash, node.invoke/system.run)"
      - "Security: device auth, token scopes, exec approvals"
      - "Channels: Discord, Telegram, WhatsApp, Slack, IRC, etc."
      - "Skills: 50+ built-in (weather, time, memo, etc.)"
      - "Memory: conversation persistence, context recall"
      - "Sessions: multi-session management, sub-agent spawn"
      - "ACP (Agent Control Protocol): client↔agent bridge"
      - "TTS: unified provider selector (Edge TTS free, Google Cloud, OpenAI, ElevenLabs) with direct API calls"
    connection_protocol:
      handshake: "connect.challenge → connect (protocol v3)"
      auth: "device identity + token scopes (Ed25519 signed nonce)"
      client_id: "cli (paired device identifier)"
      methods: "88 methods (agent, sessions.*, exec.*, skills.*, channels.*, etc.)"
    what_naia_uses:
      - "Gateway daemon as systemd user service"
      - "Command execution via exec.bash (preferred) or node.invoke fallback"
      - "exec.approvals for permission system"
      - "sessions.* for session management (when exposed by gateway config)"
      - "skills.invoke and/or browser.request for web/browser actions"
      - "channels.* for Discord/Telegram"
      - "agent method for agent interaction"

  pillar_2_careti:
    role: "Agent intelligence (LLM + tools + persona)"
    provides:
      - "Multi-provider LLM: Gemini (default), xAI (Grok), Claude"
      - "Tool definitions: GATEWAY_TOOLS (8 tools)"
      - "Function calling: Gemini native (xAI/Claude = tech debt)"
      - "Alpha persona: system prompt, emotion mapping"
      - "Cost tracking: per-request cost display"
      - "stdio JSON lines protocol: Shell ↔ Agent"
    what_naia_uses:
      - "LLM providers (gemini.ts, xai.ts, anthropic.ts)"
      - "Tool loop (max 10 iterations, abort support)"
      - "Permission tiers 0-3"
      - "stdio protocol (chat_request/text/tool_use/tool_result/etc.)"

  pillar_3_opencode:
    role: "Architecture pattern (client/server separation)"
    provides:
      - "Clean client/server separation"
      - "Provider abstraction layer"
      - "LSP-style communication pattern"
    what_naia_uses:
      - "Shell (client) / Agent (server) separation via stdio"
      - "Provider factory pattern (buildProvider)"
      - "Clean module boundaries (shell/agent/gateway)"

runtime_architecture:
  diagram: |
    ┌─────────────────────────────────────────────────────────┐
    │  Naia Shell (Tauri 2 + React + Three.js VRM Avatar) │
    │  Role: Desktop UI, avatar rendering, chat panel        │
    │  Source: Naia + AIRI (VRM) + shadcn/ui              │
    └──────────────────────┬──────────────────────────────────┘
                           │ stdio JSON lines
    ┌──────────────────────▼──────────────────────────────────┐
    │  Naia Agent (Node.js)                                │
    │  Role: LLM connection, tool orchestration, Alpha persona│
    │  Source: Careti providers + OpenCode pattern             │
    │  Features: multi-LLM, TTS, emotion, cost tracking       │
    └──────────────────────┬──────────────────────────────────┘
                           │ WebSocket (ws://127.0.0.1:18789)
    ┌──────────────────────▼──────────────────────────────────┐
    │  OpenClaw Gateway (systemd user service)                │
    │  Role: Execution, security, channels, skills, memory    │
    │  Source: OpenClaw ecosystem (npm: openclaw)              │
    │  Auth: device identity + token scopes (protocol v3)     │
    │  Methods: dynamic by profile (agent, node.invoke,        │
    │  sessions.*, browser.request, skills.*, channels.* ...)  │
    └─────────────────────────────────────────────────────────┘

  shell_ui_layout:
    description: "Shell component hierarchy and layout"
    structure: |
      App
      ├── TitleBar (panel toggle button + window controls)
      └── .app-layout [data-panel-position="left"|"right"|"bottom"]
          ├── .side-panel (ChatPanel — only when panelVisible=true)
          └── .main-area (AvatarCanvas — always visible)
    panelPosition: "'left' | 'right' | 'bottom' — controls CSS flex-direction on .app-layout"
    panelVisible: "boolean — toggles .side-panel presence; avatar always stays"
    panelSize: "number (0-100) — chat panel percentage of viewport. Default: 70"
    avatar_sizing: "ResizeObserver on container (not window resize)"
    config_sync: "panelPosition + panelVisible + panelSize + liveVoice + liveModel + voiceConversation synced to Lab via LAB_SYNC_FIELDS"

  data_flow:
    chat: "User → Shell → Agent → LLM → Agent → Shell → User"
    tool_exec: "LLM → Agent (tool_use) → Gateway (exec.bash or node.invoke) → OS → result → LLM"
    approval: "Gateway → Agent (approval_request) → Shell (modal) → user decision → Agent → Gateway"
    external: "Discord msg → Gateway → Agent → LLM → Agent → Gateway → Discord reply"

credential_storage:
  description: "naiaKey dual-storage architecture (localStorage + Tauri secure store)"
  updated: "2026-03-05"
  overview: |
    naiaKey (Naia Lab API key) is stored in two locations for reliability:
    1. localStorage — sync, fast, used by all UI components via saveConfig/loadConfig
    2. Tauri secure store (plugin-store) — async, encrypted, persists across browser storage clears
  write_points:
    login: "SettingsTab/OnboardingWizard: saveConfig({naiaKey}) + saveSecretKey('naiaKey', key)"
    save: "SettingsTab handleSave: saveConfig() + void saveSecretKey()"
    logout: "SettingsTab: saveConfig({naiaKey: undefined}) + deleteSecretKey('naiaKey')"
  read_merge: |
    loadConfigWithSecrets() merges both sources with localStorage priority:
    1. Read localStorage value (sync)
    2. Read secure store value (async)
    3. If localStorage has value → use it; sync to secure store if different
    4. If only secure store has value → use it (migration/recovery case)
    This prevents stale secure store values from overriding fresh login tokens.
  naiaKey_independence: |
    naiaKey is passed as a top-level field in ChatRequest, separate from provider config.
    This allows Naia Cloud TTS to work regardless of which LLM provider is selected.
    - ChatPanel sends naiaKey in both provider.naiaKey (for LLM) and request-level naiaKey (for TTS)
    - Agent uses effectiveNaiaKey = request.naiaKey || provider.naiaKey for TTS auth
  files:
    - "shell/src/lib/config.ts — loadConfigWithSecrets(), saveConfig()"
    - "shell/src/lib/secure-store.ts — saveSecretKey(), getSecretKey(), deleteSecretKey()"
    - "shell/src/components/SettingsTab.tsx — login/logout/save handlers"
    - "shell/src/components/OnboardingWizard.tsx — lab auth handler"
    - "agent/src/index.ts — effectiveNaiaKey resolution"
    - "agent/src/protocol.ts — ChatRequest.naiaKey field"

desktop_avatar_asset_pipeline:
  purpose: "Stable local-file loading for VRM model/background in Tauri WebView"
  rules:
    - "Normalize file:// paths to absolute filesystem paths before storage/rendering."
    - "If URL appears as http://localhost/... convert to http://asset.localhost/... for Tauri asset protocol compatibility."
    - "For absolute local VRM, read bytes via Rust command read_local_binary and parse as ArrayBuffer in frontend to avoid CORS/fetch failures."
    - "Background images may use asset URL conversion; fallback to gradient if loading fails."
  e2e_note:
    - "e2e-tauri uses prebuilt binary src-tauri/target/debug/naia-shell (not pnpm build output)."
    - "When Rust command/invoke_handler changes, run cargo build in src-tauri before wdio e2e."
  agent_build_note: |
    Agent runs from shell/src-tauri/target/debug/agent/dist/index.js (pre-built).
    Vite HMR does NOT apply to agent code. After modifying agent/src/:
    1. cd agent && pnpm build (tsc compiles to agent/dist/)
    2. cp -r agent/dist/ shell/src-tauri/target/debug/agent/dist/
    Or restart `pnpm run tauri dev` which rebuilds automatically.

channel_onboarding_routing:
  description: "Discord bot add flow is routed through naia.nextain.io instead of direct webhook input"
  routes:
    - "Shell ChannelsTab login(discord) -> https://naia.nextain.io/ko/discord/connect?source=naia-shell"
    - "Onboarding complete optional action -> same route"
  security:
    - "Do not expose/use DISCORD_BOT_TOKEN in shell frontend"
    - "Bot secrets stay server-side in naia.nextain.io env"

deep_link_persistence_contract:
  description: "OAuth deep-link payload must be persisted even when specific UI tabs are not mounted"
  requirements:
    - "Deep-link events that affect runtime behavior (e.g., discord_auth_complete) must be handled by an always-mounted layer (App root or equivalent)."
    - "Settings/Onboarding listeners may update local UI state, but persistence logic must be centralized in shared lib code."
    - "Agent send default-target behavior must not depend on whether Settings tab was open during OAuth callback."
  anti_patterns:
    - "Persisting critical auth payload only inside feature tabs/components that can be unmounted."
    - "Duplicating persistence rules across multiple components with divergent fallback behavior."

memory_architecture:
  description: "Dual-origin memory: Shell (user facts) + OpenClaw (session context + semantic search)"

  overview: |
    Memory lives in TWO systems that serve different purposes and connect at session boundaries.
    Shell owns "who is the user" (facts). OpenClaw owns "what happened" (sessions + semantic index).
    Neither is a subset of the other — both are required for full memory.

  shell_memory:
    description: "User-facing facts and session summaries, owned by Tauri Shell"
    short_term:
      name: "Short-Term Memory (STM)"
      storage: "Zustand (in-memory) + SQLite messages table"
      scope: "Current session full messages"
      lifetime: "Current session ~ recent 7 days"
      implementation:
        rust: "memory.rs (facts table, Arc<Mutex<Connection>>)"
        frontend: "db.ts (invoke wrappers) + chat store (sessionId, loadSession)"
    long_term:
      name: "Long-Term Memory (LTM) — Facts"
      storage: "SQLite facts table (~/.config/naia-os/memory.db)"
      scope: "Cross-session user knowledge (name, birthday, preferences, decisions)"
      implementation:
        extraction: "memory-processor.ts extractFacts() — LLM parses conversation → {key, value}[]"
        storage: "db.ts upsertFact() → Rust memory.rs (ON CONFLICT(key) UPDATE)"
        injection: "persona.ts buildSystemPrompt() → 'Known facts about the user: ...' in system prompt"

  openclaw_memory:
    description: "Session transcripts + semantic search, owned by OpenClaw daemon"
    session_store:
      name: "Session Transcripts"
      storage: "~/.openclaw/agents/main/sessions/ (sessions.json + *.jsonl per session)"
      scope: "Full conversation history per session key (e.g. agent:main:main, discord:dm:*)"
      features:
        - "sessions.list / chat.history / sessions.transcript RPC"
        - "sessions.compact — removes old messages within a session"
        - "session-memory hook — on /new or /reset, saves conversation to workspace/memory/*.md"
    semantic_search:
      name: "Semantic Memory Index"
      storage: "~/.openclaw/memory/main.sqlite (SQLite with embeddings)"
      tools:
        - "memory_search — semantic search across sessions and workspace memory files"
        - "memory_get — retrieve specific memory entry"
      scope: "Cross-session searchable index (sessions + workspace/memory/*.md files)"
    workspace:
      name: "Workspace Bootstrap Files"
      storage: "~/.openclaw/workspace/ (SOUL.md, IDENTITY.md, USER.md)"
      sync: "Shell writes these via sync_openclaw_config (lib.rs) on settings change"
      note: "Regenerable from Shell settings — not primary data"

  data_flow: |
    === Session lifecycle (how the two systems connect) ===

    1. SESSION START
       Shell: buildMemoryContext() → getAllFacts() from Shell DB
       Shell: buildSystemPrompt(persona, {facts, userName, locale, ...})
       → System prompt sent to Agent with user facts injected

    2. DURING SESSION
       Agent ↔ OpenClaw Gateway: messages stored in session transcript (*.jsonl)
       OpenClaw: memory_search tool available for LLM to query past sessions
       Shell: Zustand store holds current messages for UI

    3. SESSION END (user clicks "New Conversation")
       Shell: summarizePreviousSession() [fire-and-forget]
         a. summarizeSession(messages) → LLM generates 2-3 sentence summary
         b. patchGatewaySession("agent:main:main", {summary}) → saved to OpenClaw session metadata
         c. extractFacts(messages, summary) → LLM extracts {key, value}[] user facts
         d. upsertFact() × N → saved to Shell facts DB (memory.db)
       OpenClaw: session-memory hook saves conversation to workspace/memory/YYYY-MM-DD-slug.md
       OpenClaw: semantic index updated with new session content

    4. NEXT SESSION
       Shell: loads facts from Shell DB → injects into system prompt
       OpenClaw: memory_search can find content from previous sessions
       → User is "remembered" through both system prompt facts AND searchable history

  discord_channel_memory: |
    Discord messages flow through OpenClaw sessions (key: agent:main:discord:direct:<userId>
    or agent:main:discord:channel:<channelId>). These are stored in OpenClaw session transcripts
    and indexed by memory_search. However, Shell fact extraction (summarizePreviousSession) only
    runs on Shell chat sessions — Discord conversations do NOT trigger fact extraction yet.

  backup_required:
    must_backup:
      - "~/.config/naia-os/memory.db — Shell facts (user knowledge, not regenerable)"
      - "~/.openclaw/memory/main.sqlite — semantic search index (rebuildable but slow)"
      - "~/.openclaw/agents/main/sessions/ — conversation transcripts"
      - "~/.openclaw/openclaw.json — gateway config (API keys, model settings)"
    regenerable:
      - "~/.openclaw/workspace/ (SOUL.md, IDENTITY.md, USER.md) — re-synced from Shell settings"
      - "~/.openclaw/credentials/ — re-authenticatable"

  search_evolution:
    phase_4_4a: "SQLite LIKE (keyword matching)"
    phase_4_4b: "SQLite FTS5 BM25 (full-text search)"
    phase_4_5: "Gemini Embedding API (semantic search)"
    phase_5_plus: "sLLM local embedding (Ollama, llama.cpp)"
  interface: |
    MemoryProcessor {
      summarize(messages): Promise<string>
      extractFacts?(messages): Promise<Fact[]>
      semanticSearch?(query, limit): Promise<MessageRow[]>
    }
  db_schema:
    shell_facts: "id TEXT PK, key TEXT UNIQUE, value TEXT, source_session TEXT, created_at INT, updated_at INT"
    openclaw_sessions: "~/.openclaw/agents/main/sessions/sessions.json (metadata) + *.jsonl (transcripts)"
    openclaw_memory: "~/.openclaw/memory/main.sqlite (semantic index with embeddings)"

skill_system:
  description: "Skill management: built-in skills, Gateway skills, and install flow"
  updated: "2026-03-05"

  built_in_skills:
    count: 20
    sync_locations:
      - "shell/src-tauri/src/lib.rs — list_skills Tauri command"
      - "shell/src/components/ChatPanel.tsx — BUILTIN_SKILLS Set (guards against disable)"
      - "agent/src/skills/built-in/*.ts — tool-bridge registry"
      - "agent/scripts/generate-skill-manifests.ts — SKIP_BUILT_IN list"
    rule: "All 4 locations must list the same 20 skills. Adding a new built-in requires updating all 4."

  gateway_skills:
    source: "OpenClaw Gateway skills.status RPC"
    response_fields:
      - "name, description, eligible, missing[]"
      - "install[]: { id, kind, label } — available installer specs per skill"
    install_kinds: "brew, node, go, uv, download"

  install_flow:
    description: "Shell → Agent → Gateway RPC for skill dependency installation"
    diagram: |
      1. Shell SkillsTab calls fetchGatewayStatus()
         → directToolCall({ action: "gateway_status" })
         → Agent skill_skill_manager → Gateway skills.status RPC
         → Returns skills[] with install[] arrays

      2. User clicks Install button
         → Shell resolves installId from gs.install[0].id
         → directToolCall({ action: "install", skillName, installId })
         → Agent skill_skill_manager → Gateway skills.install RPC
         → Gateway runs installer (brew/npm/go/etc)
         → Returns success/error

      3. Shell shows install result feedback (.skill-install-result.success/.error)
         → Re-fetches gateway status to update UI
    rpc_params:
      skills_status: "{ agentId? }"
      skills_install: "{ name, installId } — installId is REQUIRED (from install[].id)"
    note: "installId comes from skills.status response. Without it, Gateway rejects with validation error."

  directToolCall_flow: |
    Shell directToolCall() → Tauri stdin → Agent handleToolRequest()
    → executeTool(skill_skill_manager, args) → installSkill(gateway, name, installId)
    → Gateway skills.install RPC → result back to Shell

  event_cleanup: |
    GatewayClient.offEvent(handler) must be called after delegateStreaming completes
    to prevent event handler memory leaks. Added in 2026-03-05 fix.

security_layers:
  layer_1_os: "Bazzite immutable rootfs + SELinux"
  layer_2_gateway: "OpenClaw device auth + token scopes + exec approvals"
  layer_3_agent: "Permission tiers 0-3 + tool-level blocking"
  layer_4_shell: "User approval modal + tools on/off toggle"
  principle: "Defense in depth. Every layer is independent."

gateway_client_protocol:
  description: "How Naia Agent connects to OpenClaw Gateway"
  steps:
    1_ws_connect: "WebSocket connect to ws://127.0.0.1:18789"
    2_challenge: "Receive connect.challenge event with nonce"
    3_handshake: "Send connect request with auth token, protocol v3, client info"
    4_hello_ok: "Receive hello-ok with available methods and features"
    5_rpc: "Send/receive req/res frames for tool execution"
  auth_params:
    token: "gateway.auth.token from config (shared secret)"
    client_id: "cli (matches paired device clientId)"
    platform: "linux"
    mode: "cli"
    min_protocol: 3
    max_protocol: 3

voice_architecture:
  description: "Voice I/O via two modes: omni LLM (built-in voice) or STT→LLM→TTS pipeline"
  updated: "2026-03-14"

  overview: |
    Voice interaction depends on the LLM model type:
    - Omni models (Gemini Live, OpenAI Realtime): Voice I/O is built into the LLM.
      No separate STT/TTS needed — the model handles speech input and output natively.
    - Standard LLM models: Voice via independent STT → LLM → TTS pipeline.
      STT and TTS are separate, independently selectable providers.
    When an omni model is active, STT/TTS provider settings are disabled.
    STT providers, TTS providers, and LLM providers are three independent categories.

  # ── Omni Models (LLM with built-in voice) ──────────────────────

  omni_models:
    description: "LLM models with built-in bidirectional voice I/O — voice is an LLM capability, not a separate STT/TTS concern"
    provider_pattern:
      type_definition: "LiveProviderId = 'naia' | 'gemini-live' | 'openai-realtime'"
      factory: "createVoiceSession(provider: LiveProviderId, options?) → VoiceSession"
      factory_file: "shell/src/lib/voice/index.ts"
      types_file: "shell/src/lib/voice/types.ts"
      config_field: "liveProvider (stored in localStorage config)"
      settings_ui: "SettingsTab.tsx — live provider dropdown + per-provider API key/voice inputs"
    providers:
      naia:
        file: "shell/src/lib/voice/gemini-live.ts"
        route: "Browser WebSocket → any-llm gateway /v1/live → Gemini Live API"
        auth: "naiaKey (X-AnyLLM-Key header)"
        description: "Naia Cloud — uses Lab gateway as proxy to Gemini Live"
      gemini_direct:
        file: "shell/src/lib/voice/gemini-live-proxy.ts"
        route: "Tauri command → Rust WebSocket proxy (tokio-tungstenite) → Gemini Live API"
        rust_module: "shell/src-tauri/src/gemini_live.rs"
        auth: "User's Google API key (passed as URL query param)"
        description: "Direct Gemini Live — bypasses gateway, uses Rust proxy for WebKitGTK WSS limitation"
        key_detail: |
          WebKitGTK cannot connect to wss://generativelanguage.googleapis.com (hangs silently).
          Rust proxy (tokio-tungstenite) handles the WebSocket, relays via Tauri events/commands.
          Google sends JSON as Binary WebSocket frames — msg_to_text() handles both Text and Binary.
      openai_realtime:
        file: "shell/src/lib/voice/openai-realtime.ts"
        route: "Browser WebSocket → wss://api.openai.com/v1/realtime"
        auth: "User's OpenAI API key (via WebSocket subprotocols)"
        voices: "alloy, ash, ballad, coral, echo, sage, shimmer, verse, marin, cedar"
        default_model: "gpt-4o-mini-realtime-preview"
    shared_interface:
      name: "VoiceSession"
      methods: "connect(), sendAudio(base64), sendText(text), sendToolResponse(id, result), disconnect()"
      events: "onAudio, onInputTranscript, onOutputTranscript, onTurnEnd, onInterrupted, onToolCall, onError, onDisconnect"
    voice_setting:
      config_field: "liveVoice"
      stored_value: "short name (e.g., 'Kore', 'Puck')"
      available_voices:
        - "Kore (여성, 차분), Puck (남성, 활발), Charon (남성, 깊은), Aoede (여성, 밝은)"
        - "Fenrir (남성, 낮은), Leda (여성, 부드러운), Orus (남성, 단단한), Zephyr (중성)"
        - "Achernar, Gacrux, Sulafat, Umbriel"
    components:
      shell_chatpanel:
        file: "shell/src/components/ChatPanel.tsx"
        role: "UI state (off/connecting/active), event wiring, transcript accumulation"
        state: "voiceMode: 'off' | 'connecting' | 'active'"
        transcript: "incremental chunks accumulated (inputAccum/outputAccum), reset per turn"
      audio_player:
        file: "shell/src/lib/audio-player.ts"
        role: "Continuous PCM playback (24kHz Int16 mono → AudioContext)"
      mic_stream:
        file: "shell/src/lib/mic-stream.ts"
        role: "Capture mic audio, downsample to 16kHz PCM, emit base64 chunks"
      gateway_live_proxy:
        file: "project-any-llm/src/any_llm/gateway/routes/live.py"
        role: "WebSocket proxy: client ↔ Gemini Live SDK session (used by naia provider)"
    model: "configurable via config.liveModel (per-provider defaults exist)"

  # ── STT Providers (independent, pipeline mode) ─────────────────

  stt_providers:
    description: "Independent STT provider registry — used only in pipeline mode (standard LLM models)"
    note: "Omni models have built-in speech recognition (inputTranscription) and do NOT use these providers"
    registry:
      shell_types: "shell/src/lib/stt/types.ts — SttProviderMeta, SttModelMeta"
      shell_registry: "shell/src/lib/stt/registry.ts — registerSttProvider(), getSttProvider(), listSttProviders()"
      shell_barrel: "shell/src/lib/stt/index.ts — built-in provider registration"
    providers:
      vosk:
        engine: "vosk"
        type: "offline, streaming"
        description: "Lightweight offline STT, ~40-80MB models per language, real-time streaming"
        models:
          - {id: "vosk-model-small-ko-0.22", size: "82MB", wer: "28.1%"}
          - {id: "vosk-model-small-en-us-0.15", size: "40MB", wer: "9.85%"}
          - {id: "vosk-model-small-ja-0.22", size: "48MB", wer: "—"}
      whisper:
        engine: "whisper"
        type: "offline, batch (inference every 2s or 1.5s silence)"
        description: "OpenAI Whisper via whisper-rs (whisper.cpp bindings), higher accuracy, GPU-accelerated"
        models:
          - {id: "whisper-tiny", size: "75MB", wer: "~40%"}
          - {id: "whisper-base", size: "142MB", wer: "~30%"}
          - {id: "whisper-small", size: "466MB", wer: "~20%"}
          - {id: "whisper-medium", size: "1.5GB", wer: "~12%"}
          - {id: "whisper-large-v3", size: "3GB", wer: "~8%"}
        cuda_dynamic:
          description: "Runtime CUDA backend loading — single binary works on both NVIDIA and non-NVIDIA systems"
          feature_flag: "cuda-dynamic (Cargo feature on naia-shell → tauri-plugin-stt → whisper-rs)"
          mechanism: "2-pass CMake build: Pass 1 = static CPU-only binary, Pass 2 = libggml-cuda.so/.dll MODULE"
          runtime_behavior: |
            libggml-cuda.so/.dll + libggml-base.so/.dll placed next to executable → GPU acceleration
            Shared libs absent → graceful CPU-only fallback, no crash
            ggml_backend_load_all() called via std::sync::Once before first WhisperContext creation
          build_requirement: "CUDA toolkit (nvcc) required at build time only; runtime CUDA auto-detected via dlopen/LoadLibrary"
          platform_support:
            linux: "Tested — CPU fallback verified in CUDA-free distrobox (2026-03-14)"
            windows: "Untested — build.rs .dll patterns added but not verified on MSVC builds"
          fork_repo: "https://github.com/nextain/whisper-rs-fork (cuda-dynamic branch on master)"
          upstream_pr: "Planned for codeberg.org/tazz4843/whisper-rs"
      google: {status: "disabled in UI (future)"}
      elevenlabs: {status: "disabled in UI (future)"}
    runtime:
      backend: "tauri-plugin-stt (Rust) — Vosk streaming + Whisper batch engine"
      files:
        - "shell/src-tauri/plugins/tauri-plugin-stt/src/desktop.rs — Vosk streaming + Whisper batch"
        - "shell/src-tauri/plugins/tauri-plugin-stt/src/models.rs — ListenConfig with engine/modelId"
        - "shell/src-tauri/src/stt_models.rs — model catalog, download, delete, migration"
      models_dir: "~/.local/share/com.naia.shell/stt-models/"
      build_deps: "cmake. .cargo/config.toml sets WHISPER_DONT_GENERATE_BINDINGS=1"
    config_fields: "sttProvider ('vosk'|'whisper'), sttModel (model_id string)"
    settings_ui: "STT provider dropdown + model list with size/WER/download/delete buttons"
    first_install: "no sttProvider set → voice button shows popup → navigate to settings"

  # ── TTS Providers (independent, pipeline mode) ─────────────────

  tts_providers:
    description: "Independent TTS provider registry — used in pipeline mode and chat auto-TTS"
    note: "Omni models produce voice output directly and do NOT use these providers"
    default_provider: "edge (free, no login required)"
    registry:
      agent_types: "agent/src/tts/types.ts — TtsProviderDefinition, TtsSynthesizeOptions"
      agent_registry: "agent/src/tts/registry.ts — registerTtsProvider(), synthesize(), listTtsProviders()"
      agent_barrel: "agent/src/tts/index.ts — side-effect imports + re-exports"
      shell_types: "shell/src/lib/tts/types.ts — TtsProviderMeta"
      shell_registry: "shell/src/lib/tts/registry.ts — shell-side metadata for Settings UI"
    pattern: |
      Map-based registry with self-registration at module load.
      Each provider file calls registerTtsProvider() at top level.
      Barrel file (tts/index.ts) imports all providers to trigger registration.
    adding_provider: |
      1. Create agent/src/tts/{name}.ts
      2. Implement TtsProviderDefinition interface (synthesize + metadata)
      3. Call registerTtsProvider({...}) at module scope
      4. Add import in agent/src/tts/index.ts
      5. Add TtsProviderMeta in shell/src/lib/tts/registry.ts (for Settings UI)
    providers:
      edge:
        route: "ChatPanel → agent → OpenClaw gateway → Edge TTS (free)"
        auth: "none"
      nextain:
        route: "ChatPanel → agent → nextain-tts.ts → any-llm gateway /v1/audio/speech → Google Cloud TTS"
        voice_derivation: "config.liveVoice → 'ko-KR-Chirp3-HD-{name}'"
        auth: "naiaKey via X-AnyLLM-Key header"
      google:
        route: "ChatPanel → agent → OpenClaw gateway → Google Cloud TTS"
        voices: "Neural2 series (ko-KR-Neural2-A, etc.)"
        auth: "Google API key"
      openai:
        route: "ChatPanel → agent → OpenClaw gateway → OpenAI TTS API"
        auth: "OpenAI API key"
      elevenlabs:
        route: "ChatPanel → agent → OpenClaw gateway → ElevenLabs API"
        auth: "ElevenLabs API key"
    naiaKey_routing: |
      TTS auth (naiaKey) is independent of LLM provider selection.
      ChatRequest carries naiaKey as top-level field, so Naia Cloud TTS works
      even when LLM is set to gemini/openai/xai/anthropic.
    engine_selection: |
      ttsEngine is derived from ttsProvider:
      - google, nextain → "google" engine (direct Google Cloud TTS)
      - edge, openai, elevenlabs → "openclaw" engine (via OpenClaw gateway)
    settings_ui: "TTS provider dropdown + API key input + voice picker (auto-discovery from registry)"
    pricing:
      edge: "Free"
      nextain: "Naia credit (included with Naia account)"
      google: "$16/1M chars (Neural2)"
      openai: "$15/1M chars (tts-1)"
      elevenlabs: "$0.30/1K chars"

  # ── Testing ────────────────────────────────────────────────────

  testing:
    description: "123+ tests — real API keys, actual audio verification, STT×TTS combos"
    total: "123+ tests (103 Tauri + 10 Playwright + 10+ unit)"
    tauri_e2e:
      - "76-tts-provider-switching (12) — TTS dropdown, API key, voice, Edge preview"
      - "77-stt-provider-switching (7) — STT dropdown, order free→Naia→paid, API key"
      - "78-voice-pipeline-mode (11) — UI labels, voice picker, button states, 🗣️ icon"
      - "79-pipeline-voice-activation (9) — voice button lifecycle, CSS 3-state"
      - "80-tts-preview-all-providers (5) — real API key preview: Edge/OpenAI/Google/ElevenLabs"
      - "81-chat-tts-response (9) — chat → AI response → TTS audio playback"
      - "82-chat-tts-multi-model (6) — model switching preserves TTS"
      - "83-tts-per-model-verification (15) — 5 LLM providers × model: chat + TTS"
      - "84-chat-tts-per-provider (12) — 4 TTS providers: UI key input → save → chat → verify"
      - "85-voice-actual-recording (7) — WebKitGTK MediaRecorder, mic, STT init"
      - "86-stt-tts-full-pipeline (8) — Google STT × Edge/OpenAI/ElevenLabs TTS pipeline"
      - "87-tts-audio-verification (5) — actual audio data received: 4 TTS providers"
      - "88-stt-tts-combo-verification (6) — 5 STT×TTS combos: voice activation"
    playwright_e2e:
      - "pipeline-voice (10) — STT mock → LLM → TTS, debounce, interrupt, Whisper"
    e2e_principle: |
      E2E = actual app UI with real API keys. Tests must verify:
      1. Actual audio DATA received (not just "no error")
      2. Audio.play() actually called
      3. STT MediaRecorder actually creates chunks
      4. All provider combos tested
      Test code itself must be reviewed before trusting results.
    run_all: |
      cd shell && pnpm test                                          # Unit tests
      cd agent && pnpm test                                          # Agent tests
      cd shell && source ../my-envs/naia-os-shell.env
      npx wdio run e2e-tauri/wdio.conf.ts --spec e2e-tauri/specs/80-tts-preview-all-providers.spec.ts
      npx wdio run e2e-tauri/wdio.conf.ts --spec e2e-tauri/specs/84-chat-tts-per-provider.spec.ts
      npx wdio run e2e-tauri/wdio.conf.ts --spec e2e-tauri/specs/83-tts-per-model-verification.spec.ts
      npx playwright test e2e/pipeline-voice.spec.ts                 # Pipeline STT→LLM→TTS

  # ── Pipeline Voice (STT → LLM → TTS) ──────────────────────────

  pipeline_voice:
    description: "Voice conversation for standard (non-omni) LLM models via independent STT → LLM → TTS pipeline"
    updated: "2026-03-14"
    status: "implemented — TTS pipeline working, STT (Vosk + Whisper) working"
    architecture: |
      User speaks → STT provider (Vosk/Whisper, offline) → recognized text
      → sendChatMessage (normal LLM path, tools disabled, Agent auto-TTS disabled)
      → LLM streams text → SentenceChunker (sentence boundary detection)
      → emotion tag/emoji stripped → per-sentence tts_request → TTS provider (Edge default)
      → MP3 base64 → AudioQueue (sequential playback with error logging)
    components:
      sentence_chunker:
        file: "shell/src/lib/voice/sentence-chunker.ts"
        description: "Korean+English mixed text, hard punct split (.!?。！？~), min 10 / max 120 chars"
      audio_queue:
        file: "shell/src/lib/voice/audio-queue.ts"
        description: "Sequential MP3 base64 playback, interrupt support, avatar speaking state"
      tts_request:
        agent: "agent/src/index.ts handleTtsRequest() + agent/src/protocol.ts TtsRequest"
        shell: "shell/src/lib/chat-service.ts requestTts()"
      logger_bridge:
        description: "Frontend Logger bridges to Rust stderr via frontend_log command for terminal diagnostics"
        files: ["shell/src/lib/logger.ts", "shell/src-tauri/src/lib.rs"]
    state_flow: "LISTENING → PROCESSING → SPEAKING → LISTENING"
    interrupt: "STT active during playback — user speech clears AudioQueue + cancels LLM stream"
    debounce: "1000ms for multi-utterance merging"
    rules: |
      - Tools DISABLED in pipeline mode (prevents tool loops blocking TTS)
      - Agent auto-TTS DISABLED (frontend handles per-sentence TTS via SentenceChunker)
      - Emotion tags ([HAPPY] etc.) and emoji stripped before TTS
    openclaw_separation: "STT/TTS handled independently. OpenClaw only for LLM routing + skills/tools."
    files:
      - "shell/src/components/ChatPanel.tsx — pipeline refs, handleVoiceToggle, handleChunk pipeline logic"
      - "shell/src/lib/voice/sentence-chunker.ts"
      - "shell/src/lib/voice/audio-queue.ts"
      - "shell/src/lib/chat-service.ts — requestTts()"
      - "agent/src/index.ts — handleTtsRequest()"

  # ── Shared ─────────────────────────────────────────────────────

  voice_gender_defaults: |
    Default voice is automatically set based on VRM avatar gender:
    - VRM models 1,3 (female) → liveVoice: "Kore", Edge TTS: "ko-KR-SunHiNeural", Google TTS: "ko-KR-Neural2-A"
    - VRM models 2,4 (male) → liveVoice: "Puck", Edge TTS: "ko-KR-InJoonNeural", Google TTS: "ko-KR-Neural2-C"
    Logic: avatar-presets.ts → getDefaultVoiceForAvatar(), getDefaultTtsVoiceForAvatar()
    On Naia login: if Lab has saved liveVoice, use it; otherwise auto-set from VRM gender.

  billing:
    omni_models:
      pricing: "Varies by provider (Gemini: $0.10/M input + $0.40/M output, OpenAI: ~$0.10/min)"
      tracking: "usage_metadata accumulated per turn, charged on session disconnect"
      file: "project-any-llm/src/any_llm/gateway/routes/live.py (_log_live_usage)"
    tts:
      pricing: "Varies by provider (Chirp 3 HD, Neural2, Edge free, OpenAI, ElevenLabs)"
      tracking: "Per-request via any-llm gateway /v1/audio/speech"
